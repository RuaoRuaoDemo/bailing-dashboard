<!-- Bailing Daily Summary - 独立每日汇总入口（重定向到主看板audit视图） -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百灵 · 每日汇总</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#eff6ff 0%, #dbeafe 100%); }
  .redirect-card { background:#fff; border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,0.08); padding:32px 42px; text-align:center; max-width:420px; }
  .redirect-card h1 { margin:0 0 8px; font-size:20px; color:#1e293b; }
  .redirect-card p { margin:0 0 18px; font-size:13px; color:#64748b; }
  .spinner { width:28px; height:28px; border:3px solid #dbeafe; border-top-color:#2563eb; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn { display:inline-block; padding:8px 18px; background:#2563eb; color:#fff; border-radius:8px; text-decoration:none; font-size:13px; font-weight:500; transition:background .15s ease; }
  .btn:hover { background:#1d4ed8; }
</style>
</head>
<body>
  <div class="redirect-card">
    <div class="spinner"></div>
    <h1>正在打开每日汇总...</h1>
    <p>该页面已合并到主看板的"每日汇总"模块</p>
    <a class="btn" href="bailing-dashboard.html#audit">立即前往</a>
  </div>
<script>
  // 自动跳转：打开主看板 + hash=audit，用于自动切到审核明细视图
  setTimeout(function(){ window.location.href = 'bailing-dashboard.html#audit'; }, 600);
</script>
</body>
</html>
